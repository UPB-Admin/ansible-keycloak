- name: Set up basic configs and install Ansible requirements
  become: yes
  block:
    - name: Add mariadb repository signing key
      copy:
        src: mariadb-repo-key.asc
        dest: "{{ mariadb_gpg_signing_key }}"
        mode: 0644

    - name: Install required packages
      package:
        name:
          - python3-pip

    - name: Install PyMySQL
      pip:
        name: pymysql
        state: present

    # This is required for mysql since the service is created as the database user
    # and is not originally started as root and then forked
    - name: Set owner / group on PKI files
      file:
        state: directory
        recurse: yes
        path: "{{ item.value.root_dir }}"
        owner: "{{ item.value.file_owner }}"
        group: "{{ item.value.file_group }}"
      with_dict: "{{ pki_configs.database }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Check if custom mysql SELinux module to allow Galera replication is installed
      shell: "semodule -lstandard | grep -q '^{{ database_galera_replication_cil_file | basename | regex_replace('\\.cil$', '') | quote }}$'"
      changed_when: false
      failed_when: false
      register: mysql_galera_module_stat

    - name: Set up custom mysql SELinux module to allow Galera replication if it is not installed
      when: mysql_galera_module_stat.rc != 0 # grep did not find the module in the list
      block:
        - name: Create mysql SELinux module CIL file
          copy:
            src: mysql-galera-replication.cil
            dest: "{{ database_galera_replication_cil_file }}"
            mode: 0600
            owner: root
            group: root

        - name: Install mysql SELinux module
          command:
            argv: ["/usr/sbin/semodule", "-X300", "-i", "{{ database_galera_replication_cil_file }}"]

        - name: Remove mysql SElinux module CIL file
          file:
            path: "{{ database_galera_replication_cil_file }}"
            state: absent


- name: Check if secure install script was already run
  become: yes
  stat:
    path: "{{ database_secure_install_marker }}"
  register: marker_stat


- name: Check installed MariaDB package version
  when: marker_stat.stat.exists
  block:
    - name: Gather package facts
      package_facts:
        manager: auto

    - name: Fail if MariaDB appears to be set up, but not installed
      fail:
        msg: |-
          Something went wrong.
          MariaDB server package is not installed, but service appears to have been set up previously.
          Please fix the issue manually.
      when: not "MariaDB-server" in ansible_facts.packages

    - name: Set installed MariaDB server package version as fact (major and minor)
      set_fact:
        mariadb_installed_version: "{{ (ansible_facts.packages['MariaDB-server'][0].version | split('.'))[:2] | join('.')  }}"

    - name: Fail if installed version is not part of upgrade path
      fail:
        msg: "MariaDB version {{ mariadb_installed_version }} is not part of the upgrade path. Cannot upgrade."
      when: mariadb_installed_version not in mariadb_known_versions

    - name: Upgrade MariaDB version if required
      when: mariadb_installed_version is version(mariadb_latest_version, "<")
      block:
        - name: Create database backup before upgrade
          include_tasks: backup_database.yml
          vars:
            database_name: all
            database_backup_file: "mariadb-upgrade-{{ mariadb_installed_version }}.sql"

        - name: Upgrade database to latest version (version by version, system by system)
          include_tasks: upgrade_database.yml
          with_list: "{{ mariadb_known_versions | select('version', mariadb_installed_version, '>') }}"
          loop_control:
            loop_var: mariadb_version


- name: Install MariaDB packages
  become: yes
  block:
    - name: Add mariadb repository file
      template:
        src: mariadb.repo
        dest: /etc/yum.repos.d/mariadb.repo
        mode: 0600
      vars:
        mariadb_version: "{{ mariadb_latest_version }}"

    - name: Database install
      package:
        name:
          - MariaDB-server
          - MariaDB-client
        state: installed
      notify: restart database


- name: MySQL Secure Installation
  become: yes
  when: not marker_stat.stat.exists
  block:
    # Start mariadb on all nodes in order to run initial configuration
    - name: Start MariaDB
      service:
        name: mariadb
        state: started
        enabled: True

    - name: Enable UNIX Socket for the root user
      community.mysql.mysql_query:
        login_unix_socket: "{{ database_unix_socket }}"
        query: "UPDATE mysql.global_priv SET priv=json_set(priv, '$.password_last_changed', UNIX_TIMESTAMP(), '$.plugin', 'mysql_native_password', '$.authentication_string', 'invalid', '$.auth_or', json_array(json_object(), json_object('plugin', 'unix_socket'))) WHERE User='root';"
      when: database_use_unix_socket

    - name: Update database root password
      community.mysql.mysql_query:
        login_unix_socket: "{{ database_unix_socket }}"
        single_transaction: yes
        query:
          - "UPDATE mysql.global_priv SET priv=json_set(priv, '$.plugin', 'mysql_native_password', '$.authentication_string', PASSWORD('{{ vault.database.user.root.pass }}')) WHERE User='root';"
          - "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ vault.database.user.root.pass }}'"
          - "FLUSH PRIVILEGES;"

    - name: Complete initial installation
      community.mysql.mysql_query:
        login_user: root
        login_password: "{{ vault.database.user.root.pass }}"
        login_unix_socket: "{{ database_unix_socket }}"
        single_transaction: yes
        query:
          - "DELETE FROM mysql.global_priv WHERE User='';"
          - "DELETE FROM mysql.global_priv WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1');"
          - "DROP DATABASE IF EXISTS test"
          - "DELETE FROM mysql.db WHERE db='test' OR db='test\\_%'"
          - "ALTER USER 'mariadb.sys'@'localhost' IDENTIFIED BY '{{ vault.database.user.mariadb_sys.pass }}';"
          - "ALTER USER 'mysql'@'localhost' IDENTIFIED BY '{{ vault.database.user.mysql.pass }}';"

    - name: Create marker file if it does not exist
      copy:
        content: "# Do not delete this file"
        dest: "{{ database_secure_install_marker }}"
        mode: 0400


- name: Copy database configuration files
  become: yes
  block:
    - name: Create database log directory
      file:
        path: "{{ database_log_dir }}"
        state: directory
        mode: 0700
        owner: "{{ database_system_user }}"
        group: "{{ database_system_user }}"
        seuser: system_u
        setype: mysqld_log_t

    - name: Copy server configuration file
      template:
        src: mariadb_server.cnf
        dest: /etc/my.cnf.d/server.cnf
      notify: restart database

    - name: Ensure database service override directory exists
      file:
        path: "{{ database_systemd_override_dir }}"
        state: directory
        mode: 0755
        owner: root
        group: root
        seuser: system_u
        setype: systemd_unit_file_t

    - name: Modify settings for database service
      template:
        src: overrides.conf
        dest: "{{ database_systemd_override_file }}"
        mode: 0644
        owner: root
        group: root
        seuser: system_u
        setype: systemd_unit_file_t
      notify:
        - systemd reload
        - restart database


- name: Configure Galera Cluster
  become: yes
  when: database_create_galera_cluster
  block:
    - name: Install prerequirements
      package:
        name:
          - rsync
          - galera-4
          - stunnel
        state: latest

    - name: Link Shared Library
      file:
        src: /usr/lib64/galera-4
        dest: /usr/lib64/galera
        state: link

    - name: Copy galera config file
      template:
        src: galera.cnf
        dest: /etc/my.cnf.d/galera.cnf
      notify: restart database


- name: Mark database service for restart if the PKI files have changed
  debug:
    msg: "Notify restart of database service"
  when: pki_changed
  changed_when: true
  notify: restart database


- name: Force flush handlers to reload / restart database service
  meta: flush_handlers


- name: Ensure database is started before running queries
  service:
    name: mariadb
    state: started
    enabled: True


- name: Create and setup databases for Keycloak
  run_once: yes
  include_tasks: setup_database.yml
  with_items:
    - keycloak
  loop_control:
    loop_var: service


- name: Check if the Keycloak admin user exists and set a variable accordingly
  run_once: yes
  block:
    - name: Check if the USER_ENTITY table exists
      community.mysql.mysql_query:
        login_user: root
        login_password: "{{ vault.database.user.root.pass }}"
        login_unix_socket: "{{ database_unix_socket }}"
        query: "SELECT TABLE_NAME FROM information_schema.TABLES WHERE TABLE_SCHEMA = '{{ database_config.keycloak.dbname }}' AND TABLE_NAME = 'USER_ENTITY';"
      register: table_exists

    - name: Check if the Keycloak admin user exists in the database
      when: table_exists.rowcount[0] > 0
      community.mysql.mysql_query:
        login_user: root
        login_password: "{{ vault.database.user.root.pass }}"
        login_unix_socket: "{{ database_unix_socket }}"
        query: "SELECT USER.USERNAME FROM {{ database_config.keycloak.dbname }}.USER_ENTITY AS USER JOIN {{ database_config.keycloak.dbname }}.REALM AS REALM ON USER.REALM_ID = REALM.ID WHERE REALM.NAME='master' AND USER.USERNAME='admin';"
      register: admin_user

    - name: Set Keycloak admin user exists variable
      set_fact:
        keycloak_admin_exists: "{{ (admin_user.rowcount[0] | default(0)) > 0 }}"


- name: Check database to verify if keycloak is being upgraded
  run_once: yes
  block:
    - name: Check if the MIGRATION_MODEL table exists
      community.mysql.mysql_query:
        login_user: root
        login_password: "{{ vault.database.user.root.pass }}"
        login_unix_socket: "{{ database_unix_socket }}"
        query: "SELECT TABLE_NAME FROM information_schema.TABLES WHERE TABLE_SCHEMA = '{{ database_config.keycloak.dbname }}' AND TABLE_NAME = 'MIGRATION_MODEL';"
      register: table_exists

    - name: Check if keycloak is upgrading
      when: table_exists.rowcount[0] > 0
      block:
        - name: Get installed keycloak version from MIGRATION_MODEL table
          community.mysql.mysql_query:
            login_user: root
            login_password: "{{ vault.database.user.root.pass }}"
            login_unix_socket: "{{ database_unix_socket }}"
            query: "SELECT VERSION from {{ database_config.keycloak.dbname }}.MIGRATION_MODEL;"
          register: keycloak_versions

        - name: Determine the latest installed version of Keycloak
          set_fact:
            keycloak_running_version: "{{ item.VERSION }}"
          when: item.VERSION is version(keycloak_running_version, ">")
          with_items: "{{ keycloak_versions.query_result[0] }}"

        - name: Fail if keycloak would be downgraded
          fail:
            msg: "Cannot downgrade Keycloak!"
          when: keycloak_version is version(keycloak_running_version, "<")

        - name: Set Keycloak upgrading fact
          when:
            - keycloak_running_version != keycloak_not_installed_version
            - keycloak_version is version(keycloak_running_version, ">")
          set_fact:
            keycloak_upgrading: True


- name: Backup database if Keycloak is being upgraded
  run_once: yes
  when: keycloak_upgrading | default(False)
  include_tasks: backup_database.yml
  vars:
    database_name: "{{ database_config.keycloak.dbname }}"
    database_backup_file: "keycloak-{{ keycloak_running_version }}.sql"


- name: Register rsyslog logging for MariaDB service
  set_fact:
    rsyslog_log_configs: "{{ rsyslog_log_configs + [{ 'type': 'journal', 'program_names': ['mariadb', 'stunnel'] }] }}"
